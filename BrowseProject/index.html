<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Projects</title>
    <style>
        :root {--primary: #1f2937; --primary-hover: #111827; }
        * {box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        body {background-color: #f5f5f5; color: #333;}
        header {text-align: center; padding: 80px 20px 40px;}
        header h1 {font-size: 3rem; margin-bottom: 10px; color: var(--primary);}
        header p {max-width: 700px; margin: auto; color: #666;}
        .main-container {max-width: 1200px; margin: 30px auto; padding: 0 12px 60px;}
        .grid-projects {display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px; max-width: 1100px; margin: 0 auto;}
        .project-link {text-decoration: none; color: inherit; cursor: pointer;}
        .project-card {background: white; border: 1px solid #E5E7EB; border-radius: 16px; overflow: hidden; cursor: pointer; transition: all .25s ease; display: flex; flex-direction: column; height: 100%;}
        .project-card:hover {transform: translateY(-3px); border-color: #2563EB; box-shadow: 0 12px 24px rgba(0,0,0,.05);}
        .project-image {padding: 16px 16px 0;}
        .project-image img {width: 100%; aspect-ratio: 1378 / 870; display: block; border-radius: 12px; object-fit: cover;}
        .project-content {padding: 20px; display: flex; flex-direction: column; flex-grow: 1;}
        .project-category {font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
        .project-title {font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; color: #222;}
        .project-meta {margin-top: auto; padding-top: 15px;}
        .badge {display: inline-block; padding: 4px 8px; background: #efefef; border-radius: 999px; font-size: 11px; color: #555;}
        .status-message {grid-column: 1 / -1; text-align: center; padding: 40px 20px; color: #666; font-size: 16px;}
        .is-hidden {display: none !important;}
        @media (max-width: 768px) {
            .grid-projects {grid-template-columns: 1fr;}
            header h1 { font-size: 2.2rem; }}
        @media (max-width: 480px) { 
            .main-container { margin: 15px auto; padding: 0 10px; } 
            header { padding: 40px 20px 20px; }
            header h1 { font-size: 1.8rem; }}
        .modal {position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px;}
        .hidden {display: none !important;}
        .modal-content {background: #fff; width: 100%; max-width: 500px; border-radius: 12px; position: relative; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;}
        .close-modal {position: absolute; top: 15px; right: 15px; width: 40px; min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: none; border-radius: 50%; background: rgba(255,255,255,.95); backdrop-filter: blur(5px); cursor: pointer; font-size: 20px; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,.15); z-index: 100; transition: all 0.2s ease;}
        .close-modal:hover {transform: scale(1.05); box-shadow: 0 4px 12px rgba(0,0,0,.2);}
        .modal-scroll-body {overflow-y: auto; padding: 20px; width: 100%; height: 100%;}
        .modal-image {width: 100%; border-radius: 10px; margin-bottom: 15px; display: block;}
        .modal-title {padding-right: 45px; margin-bottom: 5px;}
        #modalCategory {font-size: 13px; color: #666; text-transform: uppercase; margin-bottom: 5px;}
        #modalYear {font-size: 13px; color: #888; margin-bottom: 10px;}
        #modalTech {display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0;}
        .tech-badge {background: #f2f2f2; border-radius: 999px; padding: 4px 10px; font-size: 12px; color: #444;}
        .modal-description, .project-description {color: #6B7280; line-height: 1.6; font-size: 14px;}
        .modal-description p {margin-bottom: 12px;}
        .modal-buy-btn {display: block; width: 100%; text-align: center; background: #111827; color: white; text-decoration: none; padding: 14px; border-radius: 8px; font-weight: bold; margin-top: 10px;}
    </style>
</head>
<body>
    <header>
        <h1>Browse Projects</h1>
        <p>A collection of projects, experiments, and digital products built through continuous learning and curiosity.</p>
    </header>
    <main class="main-container">
        <div id="status-msg" class="status-message">Loading projects...</div>
        <div class="grid-projects" id="project-grid"></div>
    </main>
    <div id="project-modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-modal" class="close-modal">✕</button>
            <div class="modal-scroll-body">
                <img id="modal-image" class="modal-image" alt="Proyek" onerror="this.src='./assets/noimage.webp'">
                <h2 id="modal-title" class="modal-title"></h2>
                <div id="modalCategory"></div>
                <div id="modalYear"></div>
                <div id="modalTech"></div>
                <div id="modal-description" class="modal-description"></div>
                <a id="modal-link" class="modal-buy-btn" target="_blank" rel="noopener noreferrer">Explore</a>
            </div>
        </div>
    </div>
    <script>
        (() => {
            const $ = id => document.getElementById(id);
            const SHEET_URL = "https://opensheet.elk.sh/1bStRDMbpqYRgjGYdyLqbAkoLrmwHFZR1BnOAEmTdu7k/Sheet1";
            let rawProjectsData = [];
            async function loadProjects() {
                try {
                    $('status-msg').classList.remove('is-hidden');
                    $('status-msg').textContent = 'Loading projects...';
                    const res = await fetch(SHEET_URL);
                    const data = await res.json();
                    rawProjectsData = data
                        .filter(project => project.status?.toLowerCase().trim() === 'active')
                        .filter(project => project.featured?.toLowerCase().trim() === 'true');
                    renderCatalog();
                } catch (err) {
                    console.error(err);
                    $('status-msg').textContent = 'Failed to load projects';
                    $('status-msg').classList.remove('is-hidden');
                    $('project-grid').innerHTML = '';
                }
            }
            function renderCatalog() {
                $('project-grid').innerHTML = '';
                if (!rawProjectsData.length) {
                    $('status-msg').textContent = 'No active projects found.';
                    $('status-msg').classList.remove('is-hidden');
                    return;
                }
                $('status-msg').classList.add('is-hidden');
                rawProjectsData.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'project-link';
                    const targetUrl = project.url?.trim() || '';
                    let imageUrl = './assets/noimage.webp';
                    if (project.image && project.image.trim() !== '') {
                        // Mendahulukan gambar dari spreadsheet jika diisi manual
                        imageUrl = project.image.trim();
                    } else if (targetUrl && targetUrl !== '#') {
                        // Otomatis membuat screenshot menggunakan Microlink API jika kolom image kosong
                        imageUrl = `https://api.microlink.io?url=${encodeURIComponent(targetUrl)}&screenshot=true&embed=screenshot.url`;
                    }
                    card.innerHTML = `
                        <article class="project-card">
                            <div class="project-image">
                                <img src="${imageUrl}" alt="${project.title}" onerror="this.src='./assets/noimage.webp'">
                            </div>
                            <div class="project-content">
                                <div class="project-category">${project.category || ''}</div>
                                <div class="project-title">${project.title || ''}</div>
                                <div class="project-description">${project.description ? project.description.split('\n')[0] : ''}</div>
                                <div class="project-meta">
                                    <span class="badge">${project.year || ''}</span>
                                </div>
                            </div>
                        </article>`;
                    card.addEventListener('click', () => {
                        $('modal-title').textContent = project.title;
                        $('modal-image').src = imageUrl;
                        $('modalCategory').textContent = "Category: " + (project.category || '-');
                        $('modalYear').textContent = "Year: " + (project.year || '-');
                        $('modal-link').href = targetUrl || '#';
                        const descContainer = $('modal-description');
                        descContainer.innerHTML = '';
                        if (project.description) {
                            project.description.split('\n').map(l => l.trim()).filter(Boolean).forEach(line => {
                                const p = document.createElement('p');
                                p.textContent = line;
                                descContainer.appendChild(p);
                            });
                        }
                        const techContainer = $('modalTech');
                        techContainer.innerHTML = '';
                        if (project.tech) {
                            project.tech.split(',').map(t => t.trim()).filter(Boolean).forEach(t => {
                                const badge = document.createElement('span');
                                badge.className = 'tech-badge';
                                badge.textContent = t;
                                techContainer.appendChild(badge);
                            });
                        } 
                        $('project-modal').classList.remove('hidden');
                        document.querySelector('.modal-scroll-body').scrollTop = 0;
                    });       
                    $('project-grid').appendChild(card);
                });
            }
            $('close-modal').addEventListener('click', () => $('project-modal').classList.add('hidden'));
            const modalElement = $('project-modal');
            modalElement.addEventListener('click', e => {
                if (e.target === modalElement) {
                    modalElement.classList.add('hidden');
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !modalElement.classList.contains('hidden')) {
                    modalElement.classList.add('hidden');
                }
            });
            loadProjects();
        })();
    </script>
</body>
</html>
